<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demonstração - Câmara de Iperó</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('ipero_tema') || 'institucional');</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/themes.css" />
  <script src="assets/js/themes.js"></script>
  <style>
    /* === Background com luzes caindo (aurora) === */
    body {
      background: linear-gradient(135deg, #0a3d24 0%, #0F5132 50%, #0a3d24 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    .aurora {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .aurora .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      will-change: transform;
    }
    .aurora .blob-1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(255,215,0,0.55) 0%, transparent 70%);
      top: -120px; left: 8%;
      animation: float1 14s ease-in-out infinite;
    }
    .aurora .blob-2 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(25,135,84,0.65) 0%, transparent 70%);
      top: 20%; right: -150px;
      animation: float2 18s ease-in-out infinite;
    }
    .aurora .blob-3 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(255,215,0,0.35) 0%, transparent 70%);
      bottom: -100px; left: 30%;
      animation: float3 16s ease-in-out infinite;
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(60px, 40px) scale(1.1); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-50px, 30px) scale(1.05); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -50px) scale(1.08); }
    }

    /* Raios de luz vindos de cima */
    .light-rays {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 400px;
      background: conic-gradient(
        from 90deg at 50% 0%,
        transparent 0deg,
        rgba(255,215,0,0.08) 20deg,
        transparent 40deg,
        rgba(255,255,255,0.05) 60deg,
        transparent 80deg,
        rgba(255,215,0,0.06) 100deg,
        transparent 120deg
      );
      pointer-events: none;
      z-index: 0;
    }

    .content { position: relative; z-index: 2; }

    /* === Card moderno com glassmorphism === */
    .role-card {
      position: relative;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 1.5rem;
      padding: 2.5rem 1.75rem 1.75rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow:
        0 20px 60px -15px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      overflow: hidden;
    }
    .role-card::before {
      content: "";
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(135deg, transparent 30%, rgba(255,215,0,0.4) 50%, transparent 70%);
      border-radius: inherit;
      opacity: 0;
      z-index: -1;
      transition: opacity 0.4s;
    }
    .role-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow:
        0 30px 80px -20px rgba(0, 0, 0, 0.5),
        0 0 60px -10px rgba(255, 215, 0, 0.4);
    }
    .role-card:hover::before { opacity: 1; }

    /* === Foto com anel luminoso === */
    .avatar-frame {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 1.25rem;
    }
    .avatar-frame::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--primary) 0deg,
        var(--accent) 90deg,
        var(--primary-light) 180deg,
        var(--accent) 270deg,
        var(--primary) 360deg
      );
      animation: spin 8s linear infinite;
      filter: blur(2px);
      opacity: 0.85;
    }
    .avatar-frame::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: white;
    }
    .avatar-frame img {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 25%;
      z-index: 1;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Glow específico admin (dourado) */
    .role-card.admin .avatar-frame::before {
      background: conic-gradient(
        from 0deg,
        #FFD700 0deg,
        #FFA500 90deg,
        #FFD700 180deg,
        #FFC107 270deg,
        #FFD700 360deg
      );
    }
    .role-card.admin:hover {
      box-shadow:
        0 30px 80px -20px rgba(0, 0, 0, 0.5),
        0 0 60px -10px rgba(255, 215, 0, 0.6);
    }

    .role-badge {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .role-badge.admin {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #5C3A00;
      box-shadow: 0 4px 12px -2px rgba(255,215,0,0.5);
    }
    .role-badge.vereador {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      box-shadow: 0 4px 12px -2px rgba(15,81,50,0.4);
    }
    .role-badge.atendente {
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      color: white;
      box-shadow: 0 4px 12px -2px rgba(59,130,246,0.4);
    }
    .role-card.atendente .avatar-frame::before {
      background: conic-gradient(
        from 0deg,
        #3b82f6 0deg,
        #60a5fa 90deg,
        #3b82f6 180deg,
        #1e40af 270deg,
        #3b82f6 360deg
      );
    }
    .role-card.atendente:hover {
      box-shadow:
        0 30px 80px -20px rgba(0, 0, 0, 0.5),
        0 0 60px -10px rgba(59, 130, 246, 0.6);
    }
    .role-card.atendente .role-features li::before {
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      color: white;
    }
    .role-cta.atendente {
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      color: white;
      box-shadow: 0 8px 20px -6px rgba(59,130,246,0.5);
    }

    .role-features {
      text-align: left;
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
      display: inline-block;
    }
    .role-features li {
      padding: 0.35rem 0;
      color: #4B5563;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .role-features li::before {
      content: "✓";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: var(--primary-light);
      color: white;
      border-radius: 50%;
      font-size: 0.7rem;
      font-weight: bold;
      flex-shrink: 0;
    }
    .role-card.admin .role-features li::before {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #5C3A00;
    }

    .role-cta {
      display: block;
      width: 100%;
      padding: 0.9rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.02em;
    }
    .role-cta.admin {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #5C3A00;
      box-shadow: 0 8px 20px -6px rgba(255,165,0,0.5);
    }
    .role-cta.vereador {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 8px 20px -6px rgba(15,81,50,0.5);
    }
    .role-card:hover .role-cta {
      transform: translateY(-2px);
    }

    /* Mobile */
    @media (max-width: 768px) {
      .avatar-frame { width: 120px; height: 120px; }
      .role-card { padding: 2rem 1.25rem 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- Background luminoso -->
  <div class="aurora">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="light-rays"></div>

  <div class="content">
    <header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 bg-white px-3 py-2 rounded-lg">
        <img src="assets/images/logo-ipero.jpg" alt="Câmara Municipal de Iperó" style="height: 32px; width: auto;">
      </a>
      <a href="index.html" class="text-white/80 hover:text-white text-sm">← Voltar ao site</a>
    </header>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 lg:py-16 text-center">
      <span class="inline-block px-4 py-1.5 rounded-full text-xs font-bold mb-5 tracking-widest" style="background: rgba(255,215,0,0.15); color: #FFD700; border: 1px solid rgba(255,215,0,0.3);">DEMONSTRAÇÃO INTERATIVA</span>
      <h1 class="text-4xl lg:text-5xl font-extrabold leading-tight text-white mb-4">
        Veja a Câmara de Iperó <span style="background: linear-gradient(135deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">funcionando</span>
      </h1>
      <p class="text-white/80 mb-12 text-lg max-w-2xl mx-auto">
        Esta é uma demonstração com dados fictícios. Escolha um papel para entrar:
      </p>

      <div class="grid md:grid-cols-3 gap-6">

        <!-- Card Presidente -->
        <button id="entrar-presidente" class="role-card admin">
          <div class="avatar-frame">
            <img src="assets/images/vereadores/v1.jpg" alt="Alysson Alessandro de Barros">
          </div>
          <span class="role-badge admin">Administrador</span>
          <h3 class="text-xl font-bold mt-2 mb-1" style="color: #1F2937;">Alysson Alessandro</h3>
          <p class="text-sm text-gray-500 mb-4">Presidente da Câmara</p>
          <ul class="role-features">
            <li>Painel administrativo completo</li>
            <li>Cadastro e gestão de vereadores</li>
            <li>Criação e atribuição de tarefas</li>
            <li>Visão geral de todas as demandas</li>
          </ul>
          <span class="role-cta admin">Entrar como Presidente</span>
        </button>

        <!-- Card Atendente -->
        <button id="entrar-atendente" class="role-card atendente">
          <div class="avatar-frame">
            <img src="https://i.pravatar.cc/300?img=47" alt="Maria Almeida">
          </div>
          <span class="role-badge atendente">Atendente</span>
          <h3 class="text-xl font-bold mt-2 mb-1" style="color: #1F2937;">Maria Almeida</h3>
          <p class="text-sm text-gray-500 mb-4">Atendente do gabinete</p>
          <ul class="role-features">
            <li>Registrar demandas dos cidadãos</li>
            <li>Direcionar para os vereadores</li>
            <li>Acompanhar atendimento</li>
            <li>Histórico completo de protocolos</li>
          </ul>
          <span class="role-cta atendente">Entrar como Atendente</span>
        </button>

        <!-- Card Vereadora -->
        <button id="entrar-vereador" class="role-card vereador">
          <div class="avatar-frame">
            <img src="assets/images/vereadores/v7.jpg" alt="Maria Goreti Gomes">
          </div>
          <span class="role-badge vereador">Vereadora</span>
          <h3 class="text-xl font-bold mt-2 mb-1" style="color: #1F2937;">Maria Goreti</h3>
          <p class="text-sm text-gray-500 mb-4">Vereadora (Comissão de Educação)</p>
          <ul class="role-features">
            <li>Receber demandas direcionadas</li>
            <li>Atualizar tarefas e status</li>
            <li>Publicar relatórios com fotos</li>
            <li>Ver perfis dos colegas</li>
          </ul>
          <span class="role-cta vereador">Entrar como Vereadora</span>
        </button>

      </div>

      <p class="text-white/60 text-xs mt-10 flex items-center justify-center gap-2">
        <span>🔒</span>
        Dados fictícios. Algumas ações destrutivas estão desabilitadas no modo demonstração.
      </p>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/auth-mock.js"></script>
  <script>
    document.getElementById('entrar-presidente').addEventListener('click', () => {
      Auth.loginAs('v1', true);
      window.location.href = 'app/dashboard.html';
    });
    document.getElementById('entrar-atendente').addEventListener('click', () => {
      Auth.loginAs('a1', true);
      window.location.href = 'app/dashboard.html';
    });
    document.getElementById('entrar-vereador').addEventListener('click', () => {
      Auth.loginAs('v7', true);
      window.location.href = 'app/dashboard.html';
    });
  </script>
</body>
</html>
