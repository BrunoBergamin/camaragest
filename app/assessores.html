<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Assessores - Câmara de Iperó</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('ipero_tema') || 'institucional');</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/themes.css" />
  <script src="../assets/js/themes.js"></script>
</head>
<body>

  <div id="navbar"></div>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <header class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Meus assessores</h1>
        <p class="text-gray-500 text-sm">Gerencie sua equipe de gabinete: assessores parlamentares, de imprensa e administrativos.</p>
      </div>
      <button id="btnNovo" class="btn btn-primary">+ Cadastrar assessor</button>
    </header>

    <!-- Card informativo -->
    <div class="card mb-6" style="background: #fff8e1; border-left: 4px solid #FFD700;">
      <div class="flex items-start gap-3">
        <div class="text-2xl">💡</div>
        <div class="text-sm text-gray-700">
          Os assessores cadastrados aqui pertencem à sua equipe de gabinete. Você pode incluir nome, cargo, contato e foto de cada um. Apenas você visualiza esta lista.
        </div>
      </div>
    </div>

    <section id="listaAssessores" class="grid md:grid-cols-2 gap-4"></section>
  </main>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/auth-mock.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('redirecting');
    const user = Auth.current();
    const papel = getPapel(user);

    // Apenas vereador pode ter assessores
    if (papel !== 'vereador') {
      document.body.innerHTML = '<div style="padding: 4rem; text-align: center;"><h1 style="color: var(--primary);">Acesso restrito</h1><p>Esta página é exclusiva para vereadores.</p><a href="dashboard.html" class="btn btn-primary mt-4">Voltar ao painel</a></div>';
      throw new Error('not allowed');
    }

    document.getElementById('navbar').innerHTML = UI.renderAppNavbar('assessores');

    // Cópia em memória dos assessores do vereador logado
    let assessores = (MOCK_DATA.assessores || [])
      .filter(a => a.vereadorId === user.id)
      .map(a => ({...a}));

    function render() {
      const lista = assessores.filter(a => a.ativo);
      if (lista.length === 0) {
        document.getElementById('listaAssessores').innerHTML = `
          <div class="col-span-full card text-center py-10">
            <div class="text-5xl mb-3 opacity-40">👥</div>
            <h3 class="font-bold text-gray-900 mb-2">Você ainda não tem assessores cadastrados</h3>
            <p class="text-sm text-gray-500 mb-4">Clique em "Cadastrar assessor" no topo para adicionar membros da sua equipe.</p>
          </div>
        `;
        return;
      }
      document.getElementById('listaAssessores').innerHTML = lista.map(a => `
        <div class="card">
          <div class="flex items-start gap-3">
            <img src="${a.foto}" class="avatar avatar-lg flex-shrink-0" alt="" style="object-position: center 25%;" onerror="this.onerror=null; this.src=window.imgFallback;">
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-gray-900 truncate">${a.nome}</h3>
              <p class="text-sm text-gray-600 mb-2">${a.cargo}</p>
              <div class="text-xs text-gray-500 space-y-1">
                <div>📞 ${a.telefone || 'Sem telefone'}</div>
                <div class="truncate">📧 ${a.email || 'Sem email'}</div>
              </div>
              <div class="mt-3 flex gap-2">
                <button class="btn btn-outline btn-sm" onclick="editarAssessor('${a.id}')">Editar</button>
                <button class="btn btn-ghost btn-sm" style="color: var(--danger);" onclick="removerAssessor('${a.id}')">Remover</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function abrirModal(assessor) {
      const ehEdicao = !!assessor;
      const titulo = ehEdicao ? 'Editar assessor' : 'Cadastrar novo assessor';
      const a = assessor || { nome: '', cargo: 'Assessor Parlamentar', telefone: '', email: '', foto: '' };

      const m = UI.modal({
        title: titulo,
        body: `
          <form id="formAssessor" class="space-y-3">
            <div>
              <label class="form-label">Nome completo *</label>
              <input class="form-input" name="nome" required value="${a.nome}" placeholder="Ex: Carlos Pereira">
            </div>
            <div>
              <label class="form-label">Cargo *</label>
              <select class="form-select" name="cargo" required>
                <option ${a.cargo === 'Assessor Parlamentar' ? 'selected' : ''}>Assessor Parlamentar</option>
                <option ${a.cargo === 'Assessora Parlamentar' ? 'selected' : ''}>Assessora Parlamentar</option>
                <option ${a.cargo === 'Assessor de Imprensa' ? 'selected' : ''}>Assessor de Imprensa</option>
                <option ${a.cargo === 'Assessora de Imprensa' ? 'selected' : ''}>Assessora de Imprensa</option>
                <option ${a.cargo === 'Assessor Administrativo' ? 'selected' : ''}>Assessor Administrativo</option>
                <option ${a.cargo === 'Assessora Administrativa' ? 'selected' : ''}>Assessora Administrativa</option>
                <option ${a.cargo === 'Chefe de Gabinete' ? 'selected' : ''}>Chefe de Gabinete</option>
                <option ${a.cargo === 'Assessor Jurídico' ? 'selected' : ''}>Assessor Jurídico</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="form-label">Telefone</label>
                <input class="form-input" name="telefone" value="${a.telefone}" placeholder="(15) 99999-9999">
              </div>
              <div>
                <label class="form-label">Email</label>
                <input class="form-input" type="email" name="email" value="${a.email}" placeholder="nome@email.com">
              </div>
            </div>
            <div>
              <label class="form-label">Foto (opcional)</label>
              <div class="border-2 border-dashed rounded-lg p-4 text-center text-gray-500 cursor-pointer hover:border-emerald-500" onclick="this.querySelector('input').click()">
                <input type="file" accept="image/*" class="hidden" id="fotoAssessor">
                <div class="text-3xl mb-1">📷</div>
                <p class="text-xs">Clique para escolher uma foto</p>
                ${a.foto ? `<img src="${a.foto}" id="previewFoto" class="w-16 h-16 rounded-full object-cover mx-auto mt-2">` : '<img id="previewFoto" class="hidden w-16 h-16 rounded-full object-cover mx-auto mt-2">'}
              </div>
            </div>
          </form>
        `,
        footer: `
          <button class="btn btn-ghost" data-close>Cancelar</button>
          <button class="btn btn-primary" id="btnSalvarAss">${ehEdicao ? 'Salvar alterações' : 'Cadastrar'}</button>
        `
      });

      // Preview da foto ao escolher arquivo
      let fotoData = a.foto || '';
      document.getElementById('fotoAssessor').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          fotoData = ev.target.result;
          const img = document.getElementById('previewFoto');
          img.src = fotoData;
          img.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('btnSalvarAss').addEventListener('click', () => {
        const f = document.getElementById('formAssessor');
        if (!f.checkValidity()) { f.reportValidity(); return; }
        const fd = new FormData(f);
        const novo = {
          id: ehEdicao ? a.id : ('as' + Date.now()),
          vereadorId: user.id,
          nome: fd.get('nome'),
          cargo: fd.get('cargo'),
          telefone: fd.get('telefone'),
          email: fd.get('email'),
          foto: fotoData || `https://i.pravatar.cc/300?u=${encodeURIComponent(fd.get('nome'))}`,
          ativo: true
        };
        if (ehEdicao) {
          const idx = assessores.findIndex(x => x.id === a.id);
          if (idx >= 0) assessores[idx] = novo;
          UI.toast('Assessor atualizado!', 'success');
        } else {
          assessores.push(novo);
          UI.toast('Assessor cadastrado!', 'success');
        }
        m.close();
        render();
      });
    }

    window.editarAssessor = (id) => {
      const a = assessores.find(x => x.id === id);
      if (a) abrirModal(a);
    };

    window.removerAssessor = (id) => {
      const a = assessores.find(x => x.id === id);
      if (!a) return;
      if (!confirm(`Remover ${a.nome} da sua equipe?`)) return;
      a.ativo = false;
      UI.toast('Assessor removido.', 'info');
      render();
    };

    document.getElementById('btnNovo').addEventListener('click', () => abrirModal(null));

    render();
  </script>
</body>
</html>
