<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - CâmaraGest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <header class="flex items-center justify-between mb-8 flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
        <p class="text-gray-500 text-sm" id="welcome"></p>
      </div>
      <div class="text-sm text-gray-500" id="dataAtual"></div>
    </header>

    <!-- Cards resumo -->
    <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="card metric-card green card-hover">
        <div class="text-xs uppercase tracking-wide text-gray-500 mb-2 font-semibold">Tarefas pendentes</div>
        <div class="metric-value" id="totalPendentes">0</div>
        <div class="text-xs text-gray-500 mt-2" id="pendentesSub">|</div>
      </div>
      <div class="card metric-card amber card-hover">
        <div class="text-xs uppercase tracking-wide text-gray-500 mb-2 font-semibold">Em andamento</div>
        <div class="metric-value" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;" id="totalAndamento">0</div>
        <div class="text-xs text-gray-500 mt-2">Tarefas ativas</div>
      </div>
      <div class="card metric-card gold card-hover">
        <div class="text-xs uppercase tracking-wide text-gray-500 mb-2 font-semibold">Relatórios</div>
        <div class="metric-value gold" id="totalRelatorios">0</div>
        <div class="text-xs text-gray-500 mt-2">Total publicado</div>
      </div>
      <div class="card metric-card blue card-hover">
        <div class="text-xs uppercase tracking-wide text-gray-500 mb-2 font-semibold">Vereadores ativos</div>
        <div class="metric-value" style="background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;" id="totalVereadores">0</div>
        <div class="text-xs text-gray-500 mt-2">Equipe da Câmara</div>
      </div>
    </section>

    <div class="grid lg:grid-cols-3 gap-6">
      <!-- Próximas tarefas -->
      <section class="card lg:col-span-2">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg">Próximas tarefas</h2>
          <a href="tarefas.html" class="text-sm font-semibold hover:underline" style="color: var(--primary);">Ver todas →</a>
        </div>
        <div id="listaTarefas" class="space-y-2"></div>
      </section>

      <!-- Relatórios recentes -->
      <section class="card">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg">Relatórios recentes</h2>
          <a href="relatorios.html" class="text-sm font-semibold hover:underline" style="color: var(--primary);">Ver todos →</a>
        </div>
        <div id="listaRelatorios" class="space-y-3"></div>
      </section>
    </div>

    <!-- Equipe -->
    <section class="mt-8">
      <h2 class="font-bold text-lg mb-4">Equipe da Câmara</h2>
      <div id="listaVereadores" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3"></div>
    </section>
  </main>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/auth-mock.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('redirecting');
    const user = Auth.current();

    document.getElementById('navbar').innerHTML = UI.renderAppNavbar('dashboard');
    document.getElementById('welcome').textContent = `Olá, ${user.nome.split(' ')[0]}. Aqui está o resumo da sua Câmara.`;
    document.getElementById('dataAtual').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    // Métricas com animação de contador
    const pend = MOCK_DATA.tarefas.filter(t => t.status === 'pendente');
    const and  = MOCK_DATA.tarefas.filter(t => t.status === 'em_andamento');
    function animateCount(id, target) {
      const el = document.getElementById(id);
      let cur = 0;
      const step = Math.max(1, Math.ceil(target / 30));
      const t = setInterval(() => {
        cur += step;
        if (cur >= target) { cur = target; clearInterval(t); }
        el.textContent = cur;
      }, 30);
    }
    animateCount('totalPendentes', pend.length);
    animateCount('totalAndamento', and.length);
    animateCount('totalRelatorios', MOCK_DATA.relatorios.length);
    animateCount('totalVereadores', MOCK_DATA.vereadores.filter(v => v.ativo).length);

    const minhasPendentes = pend.filter(t => t.responsavelId === user.id).length;
    document.getElementById('pendentesSub').textContent = user.isAdmin
      ? `${pend.length} no total da Câmara`
      : `${minhasPendentes} são suas`;

    // Tarefas (mostra as 5 mais próximas, ativas)
    const proximas = MOCK_DATA.tarefas
      .filter(t => t.status !== 'concluida')
      .sort((a,b) => a.prazo.localeCompare(b.prazo))
      .slice(0, 5);

    document.getElementById('listaTarefas').innerHTML = proximas.map(t => {
      const resp = getVereador(t.responsavelId);
      const vencida = new Date(t.prazo) < new Date(new Date().toDateString());
      return `
        <div class="flex items-center justify-between p-3 rounded border border-gray-100 hover:bg-gray-50">
          <div class="flex items-center gap-3 min-w-0">
            <img src="${resp.foto}" class="avatar" style="width:36px; height:36px;" alt="">
            <div class="min-w-0">
              <div class="font-semibold text-sm truncate text-gray-900">${t.titulo}</div>
              <div class="text-xs text-gray-500">${resp.nome.split(' ').slice(0,2).join(' ')},Prazo: ${fmtData(t.prazo)} ${vencida ? '<span class="text-red-600 font-semibold">⚠ Vencida</span>' : ''}</div>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span class="badge ${prioridadeBadge(t.prioridade)} hide-mobile">${prioridadeLabel(t.prioridade)}</span>
            <span class="badge ${statusBadge(t.status)}">${statusLabel(t.status)}</span>
          </div>
        </div>
      `;
    }).join('') || '<p class="text-gray-500 text-sm">Nenhuma tarefa pendente.</p>';

    // Relatórios recentes
    const recentes = [...MOCK_DATA.relatorios].sort((a,b) => b.criadoEm.localeCompare(a.criadoEm)).slice(0, 4);
    document.getElementById('listaRelatorios').innerHTML = recentes.map(r => {
      const autor = getVereador(r.autorId);
      return `
        <a href="relatorio.html?id=${r.id}" class="flex gap-3 p-2 rounded hover:bg-gray-50" style="text-decoration: none; color: inherit;">
          <img src="${r.imagens[0]?.url}" class="w-14 h-14 rounded object-cover flex-shrink-0" alt="" onerror="this.onerror=null; this.src=window.imgFallback;">
          <div class="min-w-0">
            <div class="font-semibold text-sm truncate text-gray-900">${r.titulo}</div>
            <div class="text-xs text-gray-500">${autor.nome.split(' ').slice(0,2).join(' ')},${fmtData(r.criadoEm)}</div>
            <span class="badge badge-primary mt-1" style="font-size: 0.65rem;">${categoriaLabel(r.categoria)}</span>
          </div>
        </a>
      `;
    }).join('');

    // Equipe
    document.getElementById('listaVereadores').innerHTML = MOCK_DATA.vereadores.filter(v => v.ativo).map(v => `
      <a href="vereador.html?id=${v.id}" class="card text-center p-4 hover:scale-105 transition-transform" style="text-decoration: none; color: inherit;">
        <img src="${v.foto}" class="avatar mx-auto mb-2" alt="">
        <div class="font-semibold text-sm truncate text-gray-900">${v.nome.split(' ').slice(0,2).join(' ')}</div>
        <div class="text-xs text-gray-500 truncate">${v.cargo}</div>
        ${v.isAdmin ? '<span class="badge badge-accent mt-1" style="font-size: 0.65rem;">Admin</span>' : ''}
      </a>
    `).join('');
  </script>
</body>
</html>
